version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:7.0-alpine
    container_name: liv_whiteboard_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: liv_whiteboard
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - liv-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Server Service (Express + Node.js)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: liv_whiteboard_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI:-mongodb://admin:password@mongodb:27017/liv_whiteboard?authSource=admin}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - liv-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Client Service (React + Vite)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: liv_whiteboard_client
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - liv-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  liv-network:
    driver: bridge
